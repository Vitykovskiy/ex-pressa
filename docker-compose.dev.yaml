services:
  postgres:
    image: postgres:16-alpine
    container_name: ex-pressa-postgres
    restart: unless-stopped
    env_file:
      - .env.dev
    ports:
      - '${DB_PORT}:5432'
    volumes:
      - ex-pressa-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_NAME}']
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  ex-pressa-pgdata:
